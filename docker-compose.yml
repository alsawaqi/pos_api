services:
  pos_api:
    build:
      context: .
      dockerfile: docker/dev/php/php.dockerfile
    # user: "1000:1000" # your UID:GID
    volumes:
      - ./src:/var/www/html
    command: >
      sh -c "chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && php-fpm"
    depends_on:
       - pos_api_redis
    networks:
      - charity_net

  nginx:
    image: nginx:latest
    ports:
      - "8088:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - charity_net

  artisan:
    build:
      context: .
      dockerfile: docker/dev/artisan/artisan.dockerfile
    volumes:
      - ./src:/var/www/html
    networks:
      - charity_net
    depends_on:
      - pos_api
      - pos_api_redis

  # Phase C3 (§9.3/§11.5) — the Reverb WebSocket server devices subscribe to
  # for live config/order push. Dev twin of docker-compose.prod.yml's
  # profile-gated `reverb` service. The Laravel app publishes to it via
  # REVERB_HOST=reverb (service DNS) :8080; devices on the LAN dial the
  # docker HOST on 8085 (REVERB_PUBLIC_PORT) — 8080 is left free since other
  # stacks on this machine commonly bind it.
  reverb:
    build:
      context: .
      dockerfile: docker/dev/php/php.dockerfile
    volumes:
      - ./src:/var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    restart: unless-stopped
    ports:
      - "8085:8080"
    depends_on:
      - pos_api
    networks:
      - charity_net

  # NOTE: this is a JSON-only device API — no Vue frontend — so the vite
  # service isn't needed and can be deleted. Port bumped 5175 -> 5176 only
  # to avoid colliding with pos_admin's vite (5175) if you keep it running.
  vite:
      image: node:20-alpine
      working_dir: /var/www/html
      volumes:
         - ./src:/var/www/html
      ports:
        - "5176:5174"
      environment:
        - CHOKIDAR_USEPOLLING=true
        - CHOKIDAR_INTERVAL=200
      command: sh -c "npm install && npm run dev"
      networks:
        - charity_net

  composer:
    image: composer:latest
    container_name: composer_pos_api
    volumes:
      - ./src:/app
    working_dir: /app
    command: install
    networks:
      - charity_net
      

  # Service name is intentionally unique. The shared charity_net hosts a
  # sibling project that also has a service named `redis`; with both alive,
  # Docker DNS returns BOTH IPs round-robin for the host `redis` and
  # PHP-FPM workers split sessions across the two instances — which makes
  # logins, CSRF, and everything else session-backed flicker. Keep this
  # name distinct from any other project on charity_net.
  pos_api_redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    # 6382 — pos_admin already binds 6380 and pos_merchant 6381 on the host;
    # Docker Desktop refuses duplicate host mappings. Container still listens
    # on 6379; the app reaches it via the service DNS `pos_api_redis:6379`.
    ports:
      - "6382:6379"
    volumes:
      - redis-data:/data
    networks:
      - charity_net
networks:
  charity_net:
    external: true

volumes:
  redis-data:
